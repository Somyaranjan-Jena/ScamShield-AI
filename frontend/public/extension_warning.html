<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScamShield AI — Threat Intercepted</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0b0f19;
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .modal {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(239, 68, 68, 0.5);
      border-radius: 1.5rem;
      padding: 2.5rem;
      max-width: 650px;
      width: 100%;
      box-shadow: 0 0 50px rgba(239, 68, 68, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.6);
      color: #f87171;
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 1rem;
    }
    p {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .url-box {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.875rem;
      border-radius: 0.75rem;
      font-family: monospace;
      color: #ef4444;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      word-break: break-all;
    }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .btn-safe {
      background: #0284c7;
      color: white;
      padding: 0.875rem 2rem;
      border-radius: 0.75rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn-ignore {
      background: transparent;
      color: #64748b;
      padding: 0.875rem 1.5rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="modal">
    <div class="badge">
      <span>🚨 CRITICAL THREAT DETECTED</span>
    </div>
    <h1>Phishing Site Intercepted</h1>
    <p>ScamShield AI Browser Extension has blocked access to this URL. The domain matches known banking credential harvesting templates.</p>
    <div class="url-box">http://sbi-secure-verify.com/login</div>
    <div class="actions">
      <button class="btn-safe">Return to Safety</button>
      <button class="btn-ignore">Ignore Warning</button>
    </div>
  </div>
</body>
</html>
