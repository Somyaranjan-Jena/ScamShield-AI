<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScamShield AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      min-height: 200px;
      background: #0a0e1a;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
    }
    .logo {
      font-size: 20px;
      line-height: 1;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #22d3ee;
    }
    .header p {
      font-size: 10px;
      color: #64748b;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22d3ee;
      animation: pulse 1.5s infinite;
      margin-left: auto;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .body { padding: 14px 16px; }
    label { font-size: 11px; color: #94a3b8; font-weight: 500; margin-bottom: 6px; display: block; }
    textarea {
      width: 100%;
      min-height: 90px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 12px;
      padding: 10px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
    }
    textarea:focus {
      border-color: rgba(34,211,238,0.4);
      box-shadow: 0 0 0 2px rgba(34,211,238,0.1);
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #22d3ee, #6366f1);
      color: #000;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result {
      margin-top: 12px;
      border-radius: 10px;
      padding: 12px;
      border: 1px solid;
    }
    .result.loading { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
    .result.critical { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.08); }
    .result.high { border-color: rgba(249,115,22,0.4); background: rgba(249,115,22,0.08); }
    .result.medium { border-color: rgba(234,179,8,0.4); background: rgba(234,179,8,0.08); }
    .result.low { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.08); }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .risk-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 100px;
      border: 1px solid;
    }
    .score { font-size: 20px; font-weight: 800; }
    .verdict { font-size: 11px; line-height: 1.5; color: #cbd5e1; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.07); color: #94a3b8; }
    .settings { padding: 8px 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .settings input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 11px;
      padding: 6px 10px;
      outline: none;
    }
    .error { color: #f87171; font-size: 11px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🛡️</span>
    <div>
      <h1>ScamShield AI</h1>
      <p>Digital Fraud Detector</p>
    </div>
    <div class="live-dot"></div>
  </div>

  <div class="body">
    <label for="text-input">Paste suspicious text or use right-click menu</label>
    <textarea id="text-input" placeholder="Paste any suspicious SMS, message, or call transcript here..."></textarea>
    <button class="btn btn-primary" id="analyze-btn">🔍 Analyze</button>
    <div id="result-container"></div>
    <p id="error-msg" class="error" style="display:none;"></p>
  </div>

  <div class="settings">
    <label for="api-url" style="margin-top:8px;">API URL (optional)</label>
    <input id="api-url" placeholder="http://localhost:8000" />
  </div>

  <script src="popup.js"></script>
</body>
</html>
